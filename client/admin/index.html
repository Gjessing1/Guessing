<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Guessing – Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white min-h-screen">

  <!-- Screen: Login -->
  <div id="screen-login" class="min-h-screen flex items-center justify-center px-4">
    <div class="bg-gray-800 rounded-2xl p-8 w-full max-w-sm">
      <h1 class="text-2xl font-black mb-1">Guessing</h1>
      <p class="text-gray-400 text-sm mb-6">Admin access</p>
      <input id="password-input" type="password" placeholder="Admin password" autocomplete="current-password"
        class="w-full bg-gray-700 rounded-xl p-3 border-2 border-gray-600 focus:border-indigo-500 outline-none mb-2 text-base">
      <p id="login-error" class="text-red-400 text-sm mb-4 h-4"></p>
      <button id="login-btn"
        class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-3 rounded-xl transition-colors">
        Sign In
      </button>
    </div>
  </div>

  <!-- Screen: Quiz List -->
  <div id="screen-list" class="hidden min-h-screen flex flex-col">
    <header class="flex items-center justify-between px-4 md:px-8 py-4 md:py-5 border-b border-gray-800">
      <div class="flex items-center gap-3">
        <h1 class="text-xl md:text-2xl font-black tracking-tight">Admin</h1>
        <nav class="flex gap-1">
          <button class="px-3 py-1.5 rounded-lg text-xs font-semibold bg-indigo-600 text-white">Quizzes</button>
          <button id="nav-to-results" class="px-3 py-1.5 rounded-lg text-xs font-semibold text-gray-400 hover:text-white transition-colors">Results</button>
        </nav>
      </div>
      <div class="flex items-center gap-2">
        <label class="cursor-pointer bg-gray-700 hover:bg-gray-600 text-white font-semibold py-2 px-3 md:px-4 rounded-xl transition-colors text-xs md:text-sm">
          Import
          <input id="import-file" type="file" accept=".json" class="hidden">
        </label>
        <button id="new-quiz-btn"
          class="bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-2 px-3 md:px-5 rounded-xl transition-colors text-xs md:text-sm">
          + New Quiz
        </button>
      </div>
    </header>
    <div class="px-4 md:px-8 py-2 border-b border-gray-800 flex items-center gap-2">
      <span class="text-gray-500 text-xs">Sort:</span>
      <div id="sort-btns" class="flex gap-1">
        <button data-sort="newest" class="sort-btn px-2.5 py-1 rounded-lg text-xs font-semibold bg-indigo-600 text-white">Newest</button>
        <button data-sort="oldest" class="sort-btn px-2.5 py-1 rounded-lg text-xs font-semibold text-gray-400 hover:text-white transition-colors">Oldest</button>
        <button data-sort="lastplayed" class="sort-btn px-2.5 py-1 rounded-lg text-xs font-semibold text-gray-400 hover:text-white transition-colors">Last played</button>
        <button data-sort="az" class="sort-btn px-2.5 py-1 rounded-lg text-xs font-semibold text-gray-400 hover:text-white transition-colors">A–Z</button>
      </div>
    </div>
    <div id="quiz-list" class="flex-1 px-4 md:px-8 py-4 md:py-6 space-y-3 overflow-y-auto"></div>
    <p id="list-empty" class="hidden text-center text-gray-500 mt-20">No quizzes yet. Create one!</p>
  </div>

  <!-- Screen: Quiz Editor -->
  <div id="screen-editor" class="hidden min-h-screen flex flex-col">
    <header class="px-4 md:px-8 py-3 md:py-5 border-b border-gray-800">
      <!-- Row 1: back + title -->
      <div class="flex items-center gap-2 md:gap-4 mb-2 md:mb-0">
        <button id="back-btn" class="text-gray-400 hover:text-white transition-colors text-xl font-bold flex-shrink-0">←</button>
        <input id="quiz-title" type="text" placeholder="Quiz title" maxlength="80"
          class="flex-1 min-w-0 bg-transparent text-xl md:text-2xl font-black outline-none border-b-2 border-transparent focus:border-indigo-500 pb-1 transition-colors">
        <!-- On md+ screens the buttons live inline with the title -->
        <div class="hidden md:flex items-center gap-2 flex-shrink-0">
          <button id="export-btn"
            class="bg-gray-700 hover:bg-gray-600 text-white font-semibold py-2 px-4 rounded-xl transition-colors text-sm">
            Export JSON
          </button>
          <button id="save-btn"
            class="bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-2 px-5 rounded-xl transition-colors text-sm">
            Save
          </button>
        </div>
      </div>
      <!-- Row 2 (mobile only): Export + Save full-width row -->
      <div class="flex gap-2 md:hidden">
        <button id="export-btn-mobile"
          class="flex-1 bg-gray-700 hover:bg-gray-600 text-white font-semibold py-2 px-3 rounded-xl transition-colors text-sm">
          Export JSON
        </button>
        <button id="save-btn-mobile"
          class="flex-1 bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-2 px-3 rounded-xl transition-colors text-sm">
          Save
        </button>
      </div>
    </header>
    <div class="px-4 md:px-8 py-3 border-b border-gray-800">
      <button id="add-question-btn"
        class="w-full bg-gray-700 hover:bg-gray-600 text-white font-semibold py-2.5 px-6 rounded-xl transition-colors text-sm">
        + Add Question
      </button>
    </div>
    <div id="question-list" class="flex-1 px-4 md:px-8 py-4 space-y-2 overflow-y-auto"></div>
  </div>

  <!-- Screen: Results List -->
  <div id="screen-results-list" class="hidden min-h-screen flex flex-col">
    <header class="flex items-center justify-between px-4 md:px-8 py-4 md:py-5 border-b border-gray-800">
      <div class="flex items-center gap-3">
        <h1 class="text-xl md:text-2xl font-black tracking-tight">Admin</h1>
        <nav class="flex gap-1">
          <button id="nav-to-quizzes" class="px-3 py-1.5 rounded-lg text-xs font-semibold text-gray-400 hover:text-white transition-colors">Quizzes</button>
          <button class="px-3 py-1.5 rounded-lg text-xs font-semibold bg-indigo-600 text-white">Results</button>
        </nav>
      </div>
    </header>
    <div id="results-list-el" class="flex-1 px-4 md:px-8 py-4 md:py-6 space-y-3"></div>
    <p id="results-empty" class="hidden text-center text-gray-500 mt-24">No game results yet. Play a game to see history here.</p>
  </div>

  <!-- Screen: Result Detail -->
  <div id="screen-results-detail" class="hidden min-h-screen flex flex-col">
    <header class="flex items-center gap-3 px-4 md:px-8 py-4 md:py-5 border-b border-gray-800">
      <button id="results-back-btn" class="text-gray-400 hover:text-white text-xl font-bold flex-shrink-0">←</button>
      <div class="flex-1 min-w-0">
        <p id="detail-title" class="font-bold text-lg truncate"></p>
        <p id="detail-meta" class="text-gray-400 text-sm"></p>
      </div>
      <button id="detail-export-btn"
        class="flex-shrink-0 bg-gray-700 hover:bg-gray-600 text-white font-semibold py-2 px-4 rounded-xl text-sm transition-colors">
        Export CSV
      </button>
    </header>
    <div class="flex-1 overflow-y-auto px-4 md:px-8 py-4 md:py-6 space-y-8">
      <div>
        <p class="text-gray-400 text-xs uppercase tracking-wider mb-3">Final Standings</p>
        <div id="detail-players" class="space-y-2"></div>
      </div>
      <div>
        <p class="text-gray-400 text-xs uppercase tracking-wider mb-3">Question Breakdown</p>
        <div id="detail-questions" class="space-y-2"></div>
      </div>
    </div>
  </div>

  <!-- Modal: Question Editor -->
  <div id="modal-question" class="hidden fixed inset-0 bg-black/75 z-50 flex items-center justify-center p-2 md:p-4">
    <div class="bg-gray-800 rounded-2xl w-full max-w-lg max-h-[90vh] overflow-y-auto p-4 md:p-6 shadow-2xl">
      <h2 id="modal-title" class="text-xl font-black mb-5">Add Question</h2>

      <label class="block text-gray-400 text-xs uppercase tracking-wider mb-2">Question type</label>
      <div class="flex flex-wrap gap-3 mb-4 text-sm">
        <label class="flex items-center gap-2 cursor-pointer"><input type="radio" name="q-type" value="multiple" class="accent-indigo-500"> Multiple choice</label>
        <label class="flex items-center gap-2 cursor-pointer"><input type="radio" name="q-type" value="truefalse" class="accent-indigo-500"> True / False</label>
        <label class="flex items-center gap-2 cursor-pointer"><input type="radio" name="q-type" value="lightning" class="accent-yellow-400"> ⚡ Lightning</label>
        <label class="flex items-center gap-2 cursor-pointer"><input type="radio" name="q-type" value="slide" class="accent-purple-400"> 🖼 Slide</label>
        <label class="flex items-center gap-2 cursor-pointer"><input type="radio" name="q-type" value="poll" class="accent-blue-400"> 📊 Poll</label>
        <label class="flex items-center gap-2 cursor-pointer"><input type="radio" name="q-type" value="wordcloud" class="accent-teal-400"> ☁️ Word Cloud</label>
        <label class="flex items-center gap-2 cursor-pointer"><input type="radio" name="q-type" value="droppin" class="accent-orange-400"> 📍 Drop Pin</label>
      </div>

      <label class="block text-gray-400 text-xs uppercase tracking-wider mb-1">Question text</label>
      <textarea id="q-text" rows="3" placeholder="Enter your question…"
        class="w-full bg-gray-700 rounded-xl p-3 border-2 border-gray-600 focus:border-indigo-500 outline-none mb-4 resize-none text-base"></textarea>

      <div id="opts-section">
      <label class="block text-gray-400 text-xs uppercase tracking-wider mb-2">Answer options</label>
      <div class="grid grid-cols-2 gap-3 mb-4">
        <div class="flex items-center gap-2">
          <span class="w-6 h-6 rounded bg-red-600 flex items-center justify-center text-xs font-black flex-shrink-0">A</span>
          <input id="q-opt-a" type="text" placeholder="Option A"
            class="flex-1 bg-gray-700 rounded-lg p-2 border border-gray-600 focus:border-indigo-500 outline-none text-sm">
        </div>
        <div class="flex items-center gap-2">
          <span class="w-6 h-6 rounded bg-blue-600 flex items-center justify-center text-xs font-black flex-shrink-0">B</span>
          <input id="q-opt-b" type="text" placeholder="Option B"
            class="flex-1 bg-gray-700 rounded-lg p-2 border border-gray-600 focus:border-indigo-500 outline-none text-sm">
        </div>
        <div id="opt-cd-row" class="contents">
          <div class="flex items-center gap-2">
            <span class="w-6 h-6 rounded bg-yellow-500 flex items-center justify-center text-xs font-black flex-shrink-0">C</span>
            <input id="q-opt-c" type="text" placeholder="Option C"
              class="flex-1 bg-gray-700 rounded-lg p-2 border border-gray-600 focus:border-indigo-500 outline-none text-sm">
          </div>
          <div class="flex items-center gap-2">
            <span class="w-6 h-6 rounded bg-green-600 flex items-center justify-center text-xs font-black flex-shrink-0">D</span>
            <input id="q-opt-d" type="text" placeholder="Option D"
              class="flex-1 bg-gray-700 rounded-lg p-2 border border-gray-600 focus:border-indigo-500 outline-none text-sm">
          </div>
        </div>
      </div>

      </div><!-- /opts-section -->
      <div id="correct-section">
      <label class="block text-gray-400 text-xs uppercase tracking-wider mb-2">Correct answer</label>
      <div class="flex gap-3 mb-4">
        <label class="flex items-center gap-2 cursor-pointer">
          <input type="radio" name="q-correct" value="0" class="accent-red-500"> A
        </label>
        <label class="flex items-center gap-2 cursor-pointer">
          <input type="radio" name="q-correct" value="1" class="accent-blue-500"> B
        </label>
        <label id="correct-cd" class="contents">
          <label class="flex items-center gap-2 cursor-pointer">
            <input type="radio" name="q-correct" value="2" class="accent-yellow-500"> C
          </label>
          <label class="flex items-center gap-2 cursor-pointer">
            <input type="radio" name="q-correct" value="3" class="accent-green-500"> D
          </label>
        </label>
      </div>

      </div><!-- /correct-section -->
      <div id="time-section">
      <label class="block text-gray-400 text-xs uppercase tracking-wider mb-1">Time limit (seconds)</label>
      <input id="q-time" type="number" min="5" max="120" value="20"
        class="w-28 bg-gray-700 rounded-xl p-2 border-2 border-gray-600 focus:border-indigo-500 outline-none mb-4">
      </div><!-- /time-section -->

      <label class="block text-gray-400 text-xs uppercase tracking-wider mb-2">Image (optional)</label>
      <div class="flex items-center gap-3 mb-2">
        <label class="cursor-pointer bg-gray-700 hover:bg-gray-600 font-semibold py-2 px-4 rounded-xl transition-colors text-sm">
          Upload image
          <input id="q-image-input" type="file" accept="image/*" class="hidden">
        </label>
        <button id="q-image-remove" class="hidden text-red-400 hover:text-red-300 text-sm">Remove</button>
        <span id="q-image-uploading" class="hidden text-gray-400 text-sm">Uploading…</span>
      </div>
      <img id="q-image-preview" class="hidden max-h-36 rounded-xl object-contain mb-4" src="" alt="">

      <p id="modal-error" class="text-red-400 text-sm mb-3 h-4"></p>

      <div class="flex gap-3 justify-end pt-2 border-t border-gray-700">
        <button id="modal-cancel"
          class="bg-gray-700 hover:bg-gray-600 text-white font-semibold py-2 px-5 rounded-xl transition-colors">
          Cancel
        </button>
        <button id="modal-save"
          class="bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-2 px-5 rounded-xl transition-colors">
          Save Question
        </button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
