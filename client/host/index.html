<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Guessing – Host</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @keyframes float-up {
      0%   { transform: translateY(0);     opacity: 1; }
      100% { transform: translateY(-220px); opacity: 0; }
    }
    .reaction-float {
      position: absolute;
      font-size: 2.5rem;
      animation: float-up 2s ease-out forwards;
      pointer-events: none;
      user-select: none;
    }
    @keyframes slide-in-up {
      from { transform: translateY(48px); opacity: 0; }
      to   { transform: translateY(0);    opacity: 1; }
    }
    .podium-row {
      animation: slide-in-up 0.5s cubic-bezier(0.22, 1, 0.36, 1) both;
    }
  </style>
</head>
<body class="bg-gray-900 text-white min-h-screen">

  <!-- Fixed mute button -->
  <button id="mute-btn" class="fixed top-3 right-3 z-50 bg-gray-800 rounded-full w-10 h-10 flex items-center justify-center text-lg opacity-60 hover:opacity-100 transition-opacity">🔊</button>

  <!-- Reaction overlay -->
  <div id="reaction-overlay" class="fixed inset-0 pointer-events-none z-40 overflow-hidden"></div>

  <!-- Confetti canvas (shown only during final podium) -->
  <canvas id="confetti-canvas" class="fixed inset-0 pointer-events-none z-30 hidden"></canvas>

  <!-- Screen: Lobby -->
  <div id="screen-lobby" class="hidden min-h-screen flex flex-col">
    <header class="flex items-center justify-between px-4 md:px-8 py-4 border-b border-gray-800">
      <h1 class="text-xl md:text-2xl font-black tracking-tight">Guessing</h1>
      <p class="text-gray-400 text-sm hidden md:block">Join at <span id="join-url" class="text-white font-semibold"></span></p>
    </header>

    <div class="flex flex-col md:flex-row flex-1">
      <!-- Left / Top: PIN + quiz -->
      <div class="flex flex-col items-center px-6 md:px-12 py-6 md:py-8 border-b md:border-b-0 md:border-r border-gray-800 md:flex-1 overflow-y-auto">
        <p class="text-gray-400 text-xs uppercase tracking-widest mb-2">Game PIN</p>
        <p id="lobby-pin" class="text-6xl md:text-8xl font-black tracking-widest text-white mb-4">------</p>
        <img id="qr-img" class="mb-4 rounded-xl hidden md:block" width="140" height="140" src="" alt="QR Code">
        <p class="text-gray-400 text-sm md:hidden mb-2">Join at <span id="join-url-mobile" class="text-white font-semibold"></span></p>
        <div id="lobby-player-count" class="text-gray-500 mb-2">Waiting for players…</div>
        <button id="copy-link-btn" class="text-sm text-indigo-400 hover:text-indigo-300 transition-colors underline underline-offset-2 mb-4">🔗 Copy join link</button>
        <div id="quiz-cards" class="w-full max-w-xs space-y-2 mb-4"></div>
        <div class="flex flex-col gap-2 mb-4 w-full max-w-xs">
          <label class="flex items-center gap-2 text-sm text-gray-400 cursor-pointer">
            <input type="checkbox" id="show-question-toggle" class="accent-indigo-500 w-4 h-4">
            Show question text on player screens
          </label>
          <label class="flex items-center gap-2 text-sm text-gray-400 cursor-pointer">
            <input type="checkbox" id="teams-toggle" class="accent-indigo-500 w-4 h-4">
            Enable team mode
          </label>
        </div>
        <div class="flex items-center justify-center gap-2 text-sm text-gray-400 mb-6 w-full max-w-xs">
          <span>Sound:</span>
          <div class="flex rounded-lg overflow-hidden border border-gray-700 text-xs font-semibold">
            <button data-mode="default" class="sound-mode-btn px-3 py-1.5 bg-indigo-600 text-white transition-colors">Default</button>
            <button data-mode="silent"  class="sound-mode-btn px-3 py-1.5 text-gray-400 hover:text-white transition-colors">Silent</button>
            <button data-mode="party"   class="sound-mode-btn px-3 py-1.5 text-gray-400 hover:text-white transition-colors">Party 🎉</button>
          </div>
        </div>
        <button id="start-btn"
          class="w-full max-w-xs bg-indigo-600 disabled:bg-gray-700 disabled:text-gray-500 disabled:cursor-not-allowed hover:bg-indigo-500 text-white text-xl font-bold py-4 rounded-2xl transition-colors"
          disabled>
          Select a quiz first
        </button>
      </div>

      <!-- Right / Bottom: Player list -->
      <div class="flex flex-col md:w-72 px-4 md:px-6 py-4 md:py-6 overflow-y-auto">
        <p class="text-gray-400 text-sm uppercase tracking-wider mb-3">Players</p>
        <div id="player-grid" class="flex flex-wrap gap-2"></div>
        <div id="team-overview" class="hidden mt-4 pt-4 border-t border-gray-800">
          <p class="text-gray-500 text-xs uppercase tracking-wider mb-2">Teams</p>
          <div id="team-overview-list" class="space-y-2"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Screen: Ready -->
  <div id="screen-ready" class="hidden min-h-screen flex flex-col items-center justify-center">
    <p class="text-gray-400 text-lg mb-4">All players locked in</p>
    <button id="first-question-btn"
      class="bg-indigo-600 hover:bg-indigo-500 text-white text-2xl md:text-3xl font-black py-5 md:py-6 px-12 md:px-20 rounded-2xl transition-colors">
      Start First Question →
    </button>
  </div>

  <!-- Screen: Slide -->
  <div id="screen-slide" class="hidden min-h-screen flex flex-col items-center justify-center px-8 md:px-16 gap-6">
    <img id="slide-image" class="hidden max-h-64 rounded-2xl object-contain" src="" alt="" onerror="this.classList.add('hidden')">
    <p id="slide-text" class="text-3xl md:text-5xl font-black text-center leading-snug max-w-3xl"></p>
    <button id="slide-continue-btn"
      class="mt-4 bg-indigo-600 hover:bg-indigo-500 text-white text-xl font-bold py-3 px-10 rounded-xl transition-colors">
      Continue →
    </button>
  </div>

  <!-- Screen: Question -->
  <div id="screen-question" class="hidden min-h-screen flex flex-col">
    <div class="flex items-center justify-between px-4 md:px-8 py-3 md:py-4 border-b border-gray-800">
      <span id="q-label" class="text-gray-400 font-semibold text-sm md:text-base">Question 1 of 5</span>
      <div class="relative flex items-center justify-center w-14 h-14 md:w-20 md:h-20">
        <svg viewBox="0 0 100 100" class="w-14 h-14 md:w-20 md:h-20 -rotate-90">
          <circle cx="50" cy="50" r="42" fill="none" stroke="#374151" stroke-width="10"/>
          <circle id="timer-circle" cx="50" cy="50" r="42" fill="none" stroke="#6366f1"
            stroke-width="10" stroke-linecap="round"
            stroke-dasharray="263.9" stroke-dashoffset="0"/>
        </svg>
        <span id="timer-number" class="absolute text-lg md:text-2xl font-black"></span>
      </div>
    </div>

    <div class="flex-1 flex flex-col items-center justify-center px-6 md:px-12 py-3 md:py-4 gap-3 md:gap-4">
      <img id="q-image" class="hidden max-h-36 md:max-h-52 rounded-xl object-contain" src="" alt="" onerror="this.classList.add('hidden')">
      <p id="q-text" class="text-2xl md:text-4xl font-black text-center leading-snug max-w-3xl"></p>
    </div>

    <div id="q-options" class="grid grid-cols-2 gap-2 md:gap-4 px-4 md:px-8 pb-3 md:pb-4"></div>

    <div class="flex items-center justify-between px-4 md:px-8 py-3 md:py-5 border-t border-gray-800">
      <div>
        <p id="answer-count" class="text-gray-300 text-sm md:text-lg font-semibold">0 / 0 answered</p>
        <div class="w-32 md:w-48 bg-gray-700 rounded-full h-2 mt-1">
          <div id="answer-bar" class="bg-indigo-500 h-2 rounded-full transition-all duration-300" style="width:0%"></div>
        </div>
      </div>
      <div class="flex gap-2">
        <button id="skip-btn"
          class="bg-gray-700 hover:bg-gray-600 text-white text-sm md:text-base font-bold py-2 md:py-3 px-4 md:px-6 rounded-xl transition-colors">
          Skip →
        </button>
        <button id="show-results-btn"
          class="bg-indigo-600 hover:bg-indigo-500 text-white text-base md:text-xl font-bold py-2 md:py-3 px-6 md:px-10 rounded-xl transition-colors">
          Show Results →
        </button>
      </div>
    </div>
  </div>

  <!-- Screen: Results -->
  <div id="screen-results" class="hidden min-h-screen flex flex-col">
    <div class="flex items-center justify-between px-4 md:px-8 py-4 md:py-5 border-b border-gray-800">
      <span id="results-label" class="text-gray-400 font-semibold text-sm md:text-base">Question 1 Results</span>
      <span id="results-q-text" class="text-gray-300 max-w-xs md:max-w-xl truncate text-sm"></span>
    </div>

    <div id="results-bars" class="flex flex-col gap-2 md:gap-3 px-4 md:px-12 pt-4 md:pt-6 pb-3 md:pb-4"></div>

    <div class="px-4 md:px-12 pb-4 md:pb-6">
      <p class="text-gray-500 text-xs uppercase tracking-wider mb-2 md:mb-3">Leaderboard</p>
      <div id="results-top" class="flex gap-2 md:gap-3"></div>
    </div>

    <div class="px-4 md:px-8 py-3 md:py-5 border-t border-gray-800 flex justify-end">
      <button id="next-btn"
        class="bg-indigo-600 hover:bg-indigo-500 text-white text-base md:text-xl font-bold py-2 md:py-3 px-6 md:px-10 rounded-xl transition-colors">
        Next Question →
      </button>
    </div>
  </div>

  <!-- Screen: Word Cloud Results -->
  <div id="screen-wordcloud" class="hidden min-h-screen flex flex-col">
    <div class="flex items-center justify-between px-4 md:px-8 py-4 border-b border-gray-800">
      <span id="wc-label" class="text-gray-400 font-semibold text-sm md:text-base">Word Cloud</span>
      <span id="wc-count" class="text-gray-500 text-sm"></span>
    </div>
    <div class="flex-1 flex flex-col items-center justify-center p-6 md:p-12">
      <p id="wc-q-text" class="text-lg md:text-xl font-bold mb-8 text-center max-w-2xl"></p>
      <div id="wc-cloud" class="flex flex-wrap justify-center items-center gap-2 max-w-3xl leading-tight"></div>
    </div>
    <div class="px-4 md:px-8 py-4 border-t border-gray-800 flex justify-end">
      <button id="wc-next-btn"
        class="bg-indigo-600 hover:bg-indigo-500 text-white text-base md:text-xl font-bold py-2 md:py-3 px-6 md:px-10 rounded-xl transition-colors">
        Next Question →
      </button>
    </div>
  </div>

  <!-- Screen: Drop Pin Results -->
  <div id="screen-droppin" class="hidden min-h-screen flex flex-col">
    <div class="flex items-center justify-between px-4 md:px-8 py-4 border-b border-gray-800">
      <span id="dp-label" class="text-gray-400 font-semibold text-sm md:text-base">Drop Pin</span>
      <span id="dp-count" class="text-gray-500 text-sm"></span>
    </div>
    <div class="flex-1 flex flex-col items-center justify-center p-4 md:p-8">
      <p id="dp-q-text" class="text-lg font-bold mb-4 text-center"></p>
      <div id="dp-container" class="relative w-full max-w-2xl rounded-2xl overflow-hidden bg-gray-700" style="aspect-ratio:16/9">
        <img id="dp-image" class="hidden w-full h-full object-cover" src="" alt="">
        <div id="dp-pins"></div>
      </div>
    </div>
    <div class="px-4 md:px-8 py-4 border-t border-gray-800 flex justify-end">
      <button id="dp-next-btn"
        class="bg-indigo-600 hover:bg-indigo-500 text-white text-base md:text-xl font-bold py-2 md:py-3 px-6 md:px-10 rounded-xl transition-colors">
        Next Question →
      </button>
    </div>
  </div>

  <!-- Screen: Open Text Results -->
  <div id="screen-opentext" class="hidden min-h-screen flex flex-col">
    <div class="flex items-center justify-between px-4 md:px-8 py-4 border-b border-gray-800">
      <span id="ot-label" class="text-gray-400 font-semibold text-sm md:text-base">Open Text</span>
      <span id="ot-count" class="text-gray-500 text-sm"></span>
    </div>
    <div class="flex-1 overflow-y-auto p-4 md:p-8">
      <p id="ot-q-text" class="text-lg md:text-xl font-bold mb-6 text-center max-w-2xl mx-auto"></p>
      <div id="ot-answers" class="space-y-2 max-w-2xl mx-auto"></div>
    </div>
    <div class="px-4 md:px-8 py-4 border-t border-gray-800 flex justify-end">
      <button id="ot-next-btn"
        class="bg-indigo-600 hover:bg-indigo-500 text-white text-base md:text-xl font-bold py-2 md:py-3 px-6 md:px-10 rounded-xl transition-colors">
        Next Question →
      </button>
    </div>
  </div>

  <!-- Screen: Podium -->
  <div id="screen-podium" class="hidden min-h-screen flex flex-col items-center justify-center px-6 md:px-8 py-10">
    <div class="text-5xl md:text-6xl mb-3">🏆</div>
    <h2 class="text-3xl md:text-4xl font-black mb-8 md:mb-10">Final Scores</h2>
    <!-- Top 3 large podium blocks -->
    <div id="podium-top3" class="flex items-end justify-center gap-3 md:gap-5 mb-6 w-full max-w-xl"></div>
    <!-- Remaining players in a compact list -->
    <div id="podium-list" class="w-full max-w-lg space-y-2 mb-6 md:mb-8"></div>
    <!-- Team leaderboard (shown only when players have teams) -->
    <div id="team-podium" class="hidden w-full max-w-lg mb-8 md:mb-10">
      <p class="text-gray-400 text-xs uppercase tracking-wider mb-3">Team Scores</p>
      <div id="team-scores-list" class="space-y-2"></div>
    </div>
    <button onclick="location.reload()"
      class="bg-indigo-600 hover:bg-indigo-500 text-white text-lg md:text-xl font-bold py-3 px-10 rounded-xl transition-colors">
      New Game
    </button>
  </div>

  <script src="https://cdn.socket.io/4.7.0/socket.io.min.js"></script>
  <script src="/audio.js"></script>
  <script src="app.js"></script>
</body>
</html>
