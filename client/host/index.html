<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Guessing – Host</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @keyframes float-up {
      0%   { transform: translateY(0);     opacity: 1; }
      100% { transform: translateY(-220px); opacity: 0; }
    }
    .reaction-float {
      position: absolute;
      font-size: 2.5rem;
      animation: float-up 2s ease-out forwards;
      pointer-events: none;
      user-select: none;
    }
  </style>
</head>
<body class="bg-gray-900 text-white min-h-screen">

  <!-- Fixed mute button — clicking also unlocks browser audio -->
  <button id="mute-btn" title="Click to unmute / start music" class="fixed top-3 right-3 z-50 bg-gray-800 rounded-full w-10 h-10 flex items-center justify-center text-lg opacity-60 hover:opacity-100 transition-opacity">🔇</button>

  <!-- Reaction overlay -->
  <div id="reaction-overlay" class="fixed inset-0 pointer-events-none z-40 overflow-hidden"></div>

  <!-- Screen: Lobby -->
  <div id="screen-lobby" class="hidden min-h-screen flex flex-col">
    <header class="flex items-center justify-between px-8 py-5 border-b border-gray-800">
      <h1 class="text-2xl font-black tracking-tight">Guessing</h1>
      <div class="text-right">
        <p class="text-gray-400 text-sm">Join at <span id="join-url" class="text-white font-semibold"></span></p>
      </div>
    </header>

    <div class="flex flex-1 gap-0">
      <!-- Left: PIN + start -->
      <div class="flex flex-col items-center justify-center flex-1 px-12 border-r border-gray-800">
        <p class="text-gray-400 text-sm uppercase tracking-widest mb-3">Game PIN</p>
        <p id="lobby-pin" class="text-8xl font-black tracking-widest text-white mb-6">------</p>
        <canvas id="qr-canvas" class="mb-6 rounded-xl"></canvas>
        <div id="lobby-player-count" class="text-gray-500 mb-6">Waiting for players…</div>
        <select id="quiz-select"
          class="w-full max-w-xs bg-gray-800 text-white rounded-xl px-4 py-3 border-2 border-gray-700 focus:border-indigo-500 outline-none mb-6 text-lg">
          <option value="">— Select a quiz —</option>
        </select>
        <button id="start-btn"
          class="bg-indigo-600 disabled:bg-gray-700 disabled:text-gray-500 disabled:cursor-not-allowed hover:bg-indigo-500 text-white text-2xl font-bold py-4 px-16 rounded-2xl transition-colors"
          disabled>
          Start Game
        </button>
      </div>

      <!-- Right: Player list -->
      <div class="flex flex-col w-80 px-6 py-6">
        <p class="text-gray-400 text-sm uppercase tracking-wider mb-4">Players</p>
        <div id="player-grid" class="flex flex-wrap gap-3 overflow-y-auto"></div>
      </div>
    </div>
  </div>

  <!-- Screen: Ready (game started, before first question) -->
  <div id="screen-ready" class="hidden min-h-screen flex flex-col items-center justify-center">
    <p class="text-gray-400 text-lg mb-4">All players locked in</p>
    <button id="first-question-btn"
      class="bg-indigo-600 hover:bg-indigo-500 text-white text-3xl font-black py-6 px-20 rounded-2xl transition-colors">
      Start First Question →
    </button>
  </div>

  <!-- Screen: Question -->
  <div id="screen-question" class="hidden min-h-screen flex flex-col">
    <!-- Top bar -->
    <div class="flex items-center justify-between px-8 py-4 border-b border-gray-800">
      <span id="q-label" class="text-gray-400 font-semibold">Question 1 of 5</span>
      <div class="relative flex items-center justify-center w-20 h-20">
        <svg viewBox="0 0 100 100" class="w-20 h-20 -rotate-90">
          <circle cx="50" cy="50" r="42" fill="none" stroke="#374151" stroke-width="10"/>
          <circle id="timer-circle" cx="50" cy="50" r="42" fill="none" stroke="#6366f1"
            stroke-width="10" stroke-linecap="round"
            stroke-dasharray="263.9" stroke-dashoffset="0"/>
        </svg>
        <span id="timer-number" class="absolute text-2xl font-black"></span>
      </div>
    </div>

    <!-- Question text + optional image -->
    <div class="flex-1 flex flex-col items-center justify-center px-12 py-4 gap-4">
      <img id="q-image" class="hidden max-h-52 rounded-xl object-contain" src="" alt="">
      <p id="q-text" class="text-4xl font-black text-center leading-snug max-w-3xl"></p>
    </div>

    <!-- Options (display only) -->
    <div id="q-options" class="grid grid-cols-2 gap-4 px-8 pb-4"></div>

    <!-- Footer: answer count + button -->
    <div class="flex items-center justify-between px-8 py-5 border-t border-gray-800">
      <div>
        <p id="answer-count" class="text-gray-300 text-lg font-semibold">0 / 0 answered</p>
        <div class="w-48 bg-gray-700 rounded-full h-2 mt-1">
          <div id="answer-bar" class="bg-indigo-500 h-2 rounded-full transition-all duration-300" style="width:0%"></div>
        </div>
      </div>
      <button id="show-results-btn"
        class="bg-indigo-600 hover:bg-indigo-500 text-white text-xl font-bold py-3 px-10 rounded-xl transition-colors">
        Show Results →
      </button>
    </div>
  </div>

  <!-- Screen: Results -->
  <div id="screen-results" class="hidden min-h-screen flex flex-col">
    <div class="flex items-center justify-between px-8 py-5 border-b border-gray-800">
      <span id="results-label" class="text-gray-400 font-semibold">Question 1 Results</span>
      <span id="results-q-text" class="text-gray-300 max-w-xl truncate"></span>
    </div>

    <div id="results-bars" class="flex flex-col gap-3 px-12 pt-6 pb-4"></div>

    <div class="px-12 pb-6">
      <p class="text-gray-500 text-xs uppercase tracking-wider mb-3">Leaderboard</p>
      <div id="results-top" class="flex gap-3"></div>
    </div>

    <div class="px-8 py-5 border-t border-gray-800 flex justify-end">
      <button id="next-btn"
        class="bg-indigo-600 hover:bg-indigo-500 text-white text-xl font-bold py-3 px-10 rounded-xl transition-colors">
        Next Question →
      </button>
    </div>
  </div>

  <!-- Screen: Podium -->
  <div id="screen-podium" class="hidden min-h-screen flex flex-col items-center justify-center px-8">
    <div class="text-6xl mb-4">🏆</div>
    <h2 class="text-4xl font-black mb-10">Final Scores</h2>
    <div id="podium-list" class="w-full max-w-lg space-y-3 mb-10"></div>
    <button onclick="location.reload()"
      class="bg-indigo-600 hover:bg-indigo-500 text-white text-xl font-bold py-3 px-10 rounded-xl transition-colors">
      New Game
    </button>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.4/build/qrcode.min.js"></script>
  <script src="https://cdn.socket.io/4.7.0/socket.io.min.js"></script>
  <script src="/audio.js"></script>
  <script src="app.js"></script>
</body>
</html>
