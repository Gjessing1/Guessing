# Builds the image and pushes it to the Forgejo registry.
# Auth: the automatic GITHUB_TOKEN only gets package *read* on this instance, so
# pushes 401 on blob upload. Log in with a write:package PAT stored as the
# REGISTRY_TOKEN repo secret instead (see the forgejo README).
name: docker

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  IMAGE: git.gjessing.io/gjessing1/guessing

jobs:
  build-and-push:
    runs-on: docker
    permissions:
      contents: read
      packages: write # not sufficient alone on this instance; push uses REGISTRY_TOKEN
    steps:
      - uses: actions/checkout@v4

      - name: Log in to the Forgejo registry
        run: echo "${{ secrets.REGISTRY_TOKEN }}" | docker login git.gjessing.io -u gjessing1 --password-stdin

      - name: Build and push
        run: |
          SHA_TAG="${GITHUB_SHA::7}"
          docker build -t "$IMAGE:latest" -t "$IMAGE:$SHA_TAG" .
          docker push "$IMAGE:latest"
          docker push "$IMAGE:$SHA_TAG"

  # Redeploy on the host after a successful main build. Runs against the host
  # daemon via the mounted Docker socket; the deploy project (compose file +
  # .env) is bind-mounted into the job by the runner. Pulls git.gjessing.io/...
  # :latest — the image this workflow just pushed.
  deploy:
    needs: build-and-push
    if: github.ref == 'refs/heads/main'
    runs-on: docker
    env:
      DEPLOY_DIR: /home/gjessing/docker/guessing
    steps:
      - name: Registry auth
        run: |
          mkdir -p ~/.docker
          auth=$(printf 'gjessing1:%s' "${{ secrets.REGISTRY_TOKEN }}" | base64 -w0)
          printf '{"auths":{"git.gjessing.io":{"auth":"%s"}}}' "$auth" > ~/.docker/config.json
      - name: Pull and restart
        run: |
          cd "$DEPLOY_DIR"
          docker compose pull
          docker compose up -d --remove-orphans
